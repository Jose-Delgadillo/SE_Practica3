<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Experto R6 Siege</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #1a1a1a; 
            color: #f0f0f0; 
        }
        #game-container { 
            background: #2d2d2d; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
            display: inline-block; 
            max-width: 600px; 
            width: 90%; 
            border-top: 5px solid #005A9C;
        }
        button { 
            margin: 10px; 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            border: none; 
            border-radius: 4px; 
            background-color: #005A9C; 
            color: white; 
            text-transform: uppercase;
            transition: 0.2s;
        }
        button:hover { background-color: #0078d4; }
        input { 
            padding: 12px; 
            width: 85%; 
            margin: 10px 0; 
            border: 1px solid #555; 
            border-radius: 4px; 
            background-color: #1a1a1a;
            color: white;
        }
        h1 { color: #ffffff; letter-spacing: 2px;}
        .accent { color: #ffbf00; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>R6 SIEGE <span class="accent">EXPERT SYSTEM</span></h1>
        <div id="question-area">
            <p id="question-text" style="font-size: 1.2em;">Piensa en un operador de Rainbow Six Siege...</p>
            <button id="start-btn" onclick="startGame()">Iniciar Escaneo</button>
            <br><br>
            <button id="reset-btn" onclick="clearMemory()" style="background-color: #8b0000; font-size: 12px; padding: 8px 16px;">Reiniciar Base de Datos</button>
        </div>
        
        <div id="buttons-area" style="display: none;">
            <button onclick="answer('yes')">Sí</button>
            <button onclick="answer('no')">No</button>
        </div>
        
        <div id="learn-area" style="display: none;">
            <p class="accent">El operador no está en la base de datos. Protocolo de aprendizaje activado.</p>
            <p>¿Qué operador era?</p>
            <input type="text" id="new-answer" placeholder="Ej. Caveira"><br>
            <p>Escribe una pregunta donde la respuesta sea "Sí" para tu operador, y "No" para el que yo dije:</p>
            <input type="text" id="new-question" placeholder="Ej. ¿Su habilidad especial es interrogar enemigos?"><br>
            <button onclick="learn()" style="background-color: #28a745;">Añadir al Sistema</button>
        </div>
    </div>

    <script>
        // Arbol de nodos gigante (75 nodos) con las rutas de las imágenes
        let baseConocimiento = {
            question: "¿Es un operador Atacante?",
            yes: {
                question: "¿Lleva un escudo antidisturbios de forma principal?",
                yes: {
                    question: "¿Su escudo puede emitir un flash cegador?",
                    yes: { answer: "Blitz", image: "img/blitz.png" },
                    no: { answer: "Montagne", image: "img/montagne.png" }
                },
                no: {
                    question: "¿Es un 'Hard Breacher' (destruye paredes reforzadas)?",
                    yes: {
                        question: "¿Usa un soplete táctico?",
                        yes: { answer: "Maverick", image: "img/maverick.png" },
                        no: {
                            question: "¿Usa cargas exotérmicas clásicas?",
                            yes: { answer: "Thermite", image: "img/thermite.png" },
                            no: {
                                question: "¿Dispara fidget spinners explosivos (X-KAIROS)?",
                                yes: { answer: "Hibana", image: "img/hibana.png" },
                                no: { answer: "Ace", image: "img/ace.png" }
                            }
                        }
                    },
                    no: {
                        question: "¿Su habilidad principal involucra rastrear al enemigo o hackear su información?",
                        yes: {
                            question: "¿Rastrea huellas en el suelo con un visor especial?",
                            yes: { answer: "Jackal", image: "img/jackal.png" },
                            no: {
                                question: "¿Hackea los teléfonos de los defensores para hacerlos sonar?",
                                yes: { answer: "Dokkaebi", image: "img/dokkaebi.png" },
                                no: { answer: "Lion", image: "img/lion.png" }
                            }
                        },
                        no: {
                            question: "¿Es un francotirador con mira telescópica especial?",
                            yes: {
                                question: "¿Tiene mira térmica para ver a través del humo?",
                                yes: { answer: "Glaz", image: "img/glaz.png" },
                                no: { answer: "Kali", image: "img/kali.png" }
                            },
                            no: {
                                question: "¿Se especializa en destruir dispositivos electrónicos (Anti-gadget)?",
                                yes: {
                                    question: "¿Lanza granadas EMP (Pulsos Electromagnéticos)?",
                                    yes: { answer: "Thatcher", image: "img/thatcher.png" },
                                    no: {
                                        question: "¿Usa un dron especial que dispara tásers?",
                                        yes: { answer: "Twitch", image: "img/twitch.png" },
                                        no: { answer: "IQ", image: "img/iq.png" }
                                    }
                                },
                                no: {
                                    question: "¿Se especializa en destruir paredes NO reforzadas (Soft Breach)?",
                                    yes: {
                                        question: "¿Usa un martillo táctico pesado?",
                                        yes: { answer: "Sledge", image: "img/sledge.png" },
                                        no: {
                                            question: "¿Usa un lanzagranadas acoplado bajo el cañón (Skeleton Key)?",
                                            yes: { answer: "Buck", image: "img/buck.png" },
                                            no: {
                                                question: "¿Dispara proyectiles explosivos muy rápidos (munición de voladura)?",
                                                yes: { answer: "Ash", image: "img/ash.png" },
                                                no: { answer: "Zofia", image: "img/zofia.png" }
                                            }
                                        }
                                    },
                                    no: { answer: "Blackbeard", image: "img/blackbeard.png" }
                                }
                            }
                        }
                    }
                }
            },
            no: {
                question: "¿Su habilidad principal es colocar trampas que dañan o atrapan al enemigo?",
                yes: {
                    question: "¿Sus trampas son cepos mecánicos gigantes (Welcome Mats)?",
                    yes: { answer: "Frost", image: "img/frost.png" },
                    no: {
                        question: "¿Coloca explosivos láser en los marcos de puertas y ventanas?",
                        yes: { answer: "Kapkan", image: "img/kapkan.png" },
                        no: {
                            question: "¿Lanza minas invisibles que envenenan e impiden correr (Gu)?",
                            yes: { answer: "Lesion", image: "img/lesion.png" },
                            no: { answer: "Ela", image: "img/ela.png" }
                        }
                    }
                },
                no: {
                    question: "¿Su función principal es dar información mediante cámaras o sensores especiales?",
                    yes: {
                        question: "¿Detecta latidos cardíacos a través de las paredes?",
                        yes: { answer: "Pulse", image: "img/pulse.png" },
                        no: {
                            question: "¿Lanza cámaras adhesivas de 360 grados (Black Eyes)?",
                            yes: { answer: "Valkyrie", image: "img/valkyrie.png" },
                            no: {
                                question: "¿Usa drones invisibles que disparan ráfagas sónicas?",
                                yes: { answer: "Echo", image: "img/echo.png" },
                                no: { answer: "Maestro", image: "img/maestro.png" }
                            }
                        }
                    },
                    no: {
                        question: "¿Evita que los atacantes destruyan paredes reforzadas (Anti-Hard Breach)?",
                        yes: {
                            question: "¿Coloca baterías electrificadas en el suelo?",
                            yes: { answer: "Bandit", image: "img/bandit.png" },
                            no: {
                                question: "¿Usa inhibidores de señal en el suelo para bloquear electrónicos?",
                                yes: { answer: "Mute", image: "img/mute.png" },
                                no: { answer: "Kaid", image: "img/kaid.png" }
                            }
                        },
                        no: {
                            question: "¿Su habilidad permite curar o dar salud extra a los compañeros?",
                            yes: {
                                question: "¿Dispara inyecciones curativas a distancia con una pistola especial?",
                                yes: { answer: "Doc", image: "img/doc.png" },
                                no: { answer: "Rook", image: "img/rook.png" }
                            },
                            no: {
                                question: "¿Su habilidad se basa en denegar áreas temporalmente con elementos letales?",
                                yes: {
                                    question: "¿Lanza granadas de gas tóxico remoto?",
                                    yes: { answer: "Smoke", image: "img/smoke.png" },
                                    no: {
                                        question: "¿Usa un lanzagranadas incendiario Shumikha (antes torreta)?",
                                        yes: { answer: "Tachanka", image: "img/tachanka.png" },
                                        no: { answer: "Goyo", image: "img/goyo.png" }
                                    }
                                },
                                no: {
                                    question: "¿Es un 'Roamer' extremo enfocado en sigilo e interrogatorios?",
                                    yes: {
                                        question: "¿Puede interrogar enemigos caídos para revelar posiciones?",
                                        yes: { answer: "Caveira", image: "img/caveira.png" },
                                        no: { answer: "Vigil", image: "img/vigil.png" }
                                    },
                                    no: {
                                        question: "¿Intercepta granadas enemigas lanzadas por el aire?",
                                        yes: {
                                            question: "¿Su sistema destruye los proyectiles (Sistema Magpie)?",
                                            yes: { answer: "Jäger", image: "img/jager.png" },
                                            no: { answer: "Wamai", image: "img/wamai.png" }
                                        },
                                        no: { answer: "Castle", image: "img/castle.png" }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        };

        if(localStorage.getItem('R6ExpertSystem')) {
            baseConocimiento = JSON.parse(localStorage.getItem('R6ExpertSystem'));
        }

        let nodoActual = null;
        let nodoPadre = null;
        let ultimaRespuesta = null;

        function startGame() {
            nodoActual = baseConocimiento;
            nodoPadre = null;
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('buttons-area').style.display = 'block';
            hacerPregunta();
        }

        // AQUÍ ESTÁ LA FUNCIÓN ACTUALIZADA QUE SÍ MUESTRA LAS IMÁGENES
        function hacerPregunta() {
            if (nodoActual.question) {
                document.getElementById('question-text').innerText = nodoActual.question;
            } else {
                let htmlResultado = `El operador es: <br><strong style="font-size: 1.5em; color: #ffbf00;">${nodoActual.answer}</strong><br><br>`;
                
                if (nodoActual.image) {
                    htmlResultado += `<img src="${nodoActual.image}" style="max-width: 200px; border-radius: 10px; border: 2px solid #005A9C; box-shadow: 0 0 10px rgba(0,90,156,0.5); margin-bottom: 15px;"><br>`;
                }
                
                htmlResultado += `¿Es correcto?`;
                document.getElementById('question-text').innerHTML = htmlResultado;
            }
        }

        function answer(reply) {
            if (nodoActual.question) {
                nodoPadre = nodoActual;
                ultimaRespuesta = reply;
                nodoActual = nodoActual[reply];
                hacerPregunta();
            } else {
                if (reply === 'yes') {
                    document.getElementById('question-text').innerText = "Identificación exitosa.";
                    reiniciarInterfaz();
                } else {
                    document.getElementById('question-text').innerText = "Identificación fallida. Iniciando calibración...";
                    document.getElementById('buttons-area').style.display = 'none';
                    document.getElementById('learn-area').style.display = 'block';
                }
            }
        }

        function learn() {
            const nuevaRespuesta = document.getElementById('new-answer').value.trim();
            const nuevaPregunta = document.getElementById('new-question').value.trim();

            if(nuevaRespuesta && nuevaPregunta) {
                const respuestaAntigua = nodoActual.answer;
                const imagenAntigua = nodoActual.image; // Guardamos la imagen por si acaso
                
                nodoActual.question = nuevaPregunta;
                nodoActual.yes = { answer: nuevaRespuesta }; // El nuevo no tendrá imagen local
                nodoActual.no = { answer: respuestaAntigua, image: imagenAntigua }; // Restauramos la imagen del viejo
                delete nodoActual.answer;
                delete nodoActual.image;

                localStorage.setItem('R6ExpertSystem', JSON.stringify(baseConocimiento));

                document.getElementById('question-text').innerText = "Base de datos actualizada correctamente.";
                document.getElementById('learn-area').style.display = 'none';
                reiniciarInterfaz();
            }
        }

        function reiniciarInterfaz() {
            document.getElementById('new-answer').value = '';
            document.getElementById('new-question').value = '';
            setTimeout(() => {
                document.getElementById('start-btn').style.display = 'inline-block';
                document.getElementById('reset-btn').style.display = 'inline-block';
                document.getElementById('buttons-area').style.display = 'none';
                document.getElementById('question-text').innerText = "Piensa en un operador de Rainbow Six Siege...";
            }, 3000);
        }

        function clearMemory() {
            if(confirm("¿Seguro que quieres borrar todo lo que el sistema ha aprendido y cargar los valores por defecto?")) {
                localStorage.removeItem('R6ExpertSystem');
                location.reload();
            }
        }
    </script>
</body>
</html>
